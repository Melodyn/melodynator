# naming.yaml — карта имён предметной области
#
# Назначение:
# Отслеживать, что одна концепция называется единообразно на всех уровнях стека.
# Это точка схождения: HTML-атрибут ↔ тип ↔ store ↔ refs ↔ переменная в render.ts.
#
# Пример несоответствия: degree-rotation (data_control) + degreeRotation (stores) + rotateStep (actions)
# Правильно:            degree-rotation (data_control) + stateDegreeRotation (stores) + offsetDegreeRotation (actions)
#
# Алгоритм обновления (выполнять после каждого изменения имён):
# 1. Найти корень концепции (напр. "degree-rotation" / "degreeRotation").
# 2. Проверить все секции ниже — везде, где эта концепция используется, имя должно
#    быть образовано от одного корня с учётом формата секции.
# 3. При добавлении новой концепции — вписать её имя во все релевантные секции.
# 4. При переименовании — обновить все секции одновременно.
#
# Проверка согласованности (ИИ-агент выполняет после работы):
# 5. Сравнить имена в этом файле с фактическим кодом (data-атрибуты в HTML,
#    имена атомов в store.ts, ключи domRefs в ui.ts, типы в types/index.ts).
# 6. Если концепция есть в коде, но не в этом файле — добавить и сообщить автору.
# 7. Если концепция есть в этом файле, но не находится в коде — спросить автора:
#    это запланированное удаление или потеря?
# 8. Если одна концепция называется по-разному в разных секциях без явной причины —
#    спросить автора, прежде чем переименовывать.
#
# Форматы по секциям:
# - data_control / data_container / data_instrument / data_static_content: kebab-case (data-атрибуты HTML)
# - key_types: PascalCase (типы из types/index.ts — источник истины для именования)
# - stores: camelCase с префиксом state (stateXxx)
# - actions: camelCase, глагол + объект (offsetXxx, switchXxx, setXxx)
# - render_targets: camelCase с префиксом el (elXxx)
# - *_params: camelCase поля объекта

data_control:
  - tonic-shift     # → offsetTonicShift → stateScaleBuildParams(.tonic) → elTonicContainer
  - modal-shift     # → offsetModalShift → stateScaleBuildParams(.modalShift) → elIntervalContainers
  - degree-rotation # → offsetDegreeRotation → stateDegreeRotation → elScaleToneContainers
  - context-shift   # → offsetContext → stateContextOffset → elContextContainer
  - theme-switch    # → toggleTheme → uiStore.theme → refs.elBody
  - locale-switch   # → switchLocale → stateLocale → elLocaleSwitch
  - start-note             # → setFretboardStartNote → stateFretboardStartNotes → elFretboardStartNoteButtons
  - interval-step          # → setIntervalStep → stateScaleBuildParams(.intervalPattern) | degree=1–7; popover-форма
  - interval-display-switch # → switchIntervalDisplayMode → stateIntervalDisplayMode
  - enharmonic-simplify    # → switchEnharmonicSimplify → stateIsEnharmonicSimplify | button ♭=♯
  - add-fretboard-string   # → addFretboardString → stateFretboardStartNotes | кнопка в tfoot; popover с подтверждением
  - remove-fretboard-string # → removeFretboardString → stateFretboardStartNotes | кнопка в td номера строки; popover с подтверждением
  - open-preset-scale-modal # → declarative Bootstrap modal trigger | кнопка открытия списка пресетов гамм
  - scale-preset-shift      # → offsetScalePreset | кнопки листания пресетов над конфигуратором; направление задаётся data-direction
  - apply-preset-scale     # → control карточки пресета гаммы в модалке; preset id хранится в data-preset-scale-id
  - edit-preset-scale      # → control карточки пресета гаммы в модалке; доступна только для isCustomPreset
  - remove-preset-scale    # → control карточки пресета гаммы в модалке; доступна только для isCustomPreset

data_tooltip:
  # Атрибут data-tooltip="key" — на плейсхолдере <span>. Ключ совпадает с ключом в textTooltips.
  # data-tooltip-placement="right|bottom|..." — placement для Bootstrap Tooltip (всегда явно).
  # В initTooltips: плейсхолдер заменяется клоном template-tooltip; key переносится на кнопку.
  - tooltip  # → textTooltips.tooltip  | иконка-подсказка в шапке (рядом с about-tooltip)
  - hide     # → textTooltips.hide     | рядом со «скрыть» (строка degree)
  - tonal    # → textTooltips.tonal    | рядом с «тональное»
  - modal    # → textTooltips.modal    | рядом с «модальное»
  - degrees  # → textTooltips.degrees  | рядом со «ступеней»
  - center   # → textTooltips.center   | рядом с «центр»
  - context  # → textTooltips.context  | рядом с «контекст»
  - fretboard # → textTooltips.fretboard | иконка над фретбордом

data_static_content:
  # Атрибут data-static-content="key-kebab" — на статичных i18n-элементах.
  # Диспетчеризация в initStaticText() (ui.ts):
  #   - значение начинается с "scale-params-" → textScaleParams, ключ = часть после префикса
  #   - иначе → textContent, ключ = всё значение конвертированное kebabToCamel
  # Для добавления нового текста: только HTML + i18n ключ, JS не меняется.
  # метки конфигуратора гаммы (→ textScaleParams)
  - scale-params-offset   # → textScaleParams.offset
  - scale-params-center   # → textScaleParams.center (span внутри td)
  - scale-params-context  # → textScaleParams.context (span внутри td)
  - scale-params-tonal    # → textScaleParams.tonal (span внутри td)
  - scale-params-modal    # → textScaleParams.modal (span внутри td)
  - scale-params-degrees  # → textScaleParams.degrees (span внутри td)
  - scale-params-hide     # → textScaleParams.hide (span внутри td)
  # статичный текст страницы (→ textContent)
  - page-title
  - page-description
  - section-theory-title
  - section-theory-text
  - section-features-title
  - feature-scales
  - feature-chords
  - feature-intervals
  - feature-degrees
  - section-audience-title
  - section-audience-text
  - section-instruments-title
  - section-instruments-text
  - footer-keywords  # → textContent.footerKeywords
  - footer-about     # → textContent.footerAbout
  - footer-about-link # → textContent.footerAboutLink
  - footer-github-link # → textContent.footerGithubLink
  - preset-scale-modal-title # → textContent.presetScaleModalTitle | текст кнопки открытия и заголовка модалки пресетов
  - about-tooltip    # → textContent.aboutTooltip | текст рядом с tooltip-иконкой в шапке
  - fretboard-info   # → textContent.fretboardInfo | подпись под фретбордом
  # статичные label-тексты карточки пресета гаммы (→ textPresetScale)
  - label-preset-scale-type
  - label-preset-scale-interval-params
  - label-preset-scale-context-offset
  - label-preset-scale-modal-shift
  - label-preset-scale-degree-rotation
  - label-preset-scale-hidden-degrees
  - label-preset-scale-comment

data_template:
  # Атрибут data-template="name" — на <template>-элементах. Выбирается в domRefs.ts вместо #id.
  # id остаётся в HTML только для <label for> (доступность).
  - tooltip                         # elTooltipTemplate — кнопка с SVG-иконкой для Tooltip
  - interval-step-params            # elIntervalStepParams — форма popover выбора интервала
  - fretboard-string                # elFretboardString — шаблон строки фретборда
  - preset-scale-card               # elPresetScaleCard — шаблон карточки пресета гаммы для списка в модалке
  - fretboard-set-string-params     # elFretboardNewStringNoteParams — форма popover настройки ноты/октавы
  - add-fretboard-string-confirm    # elAddFretboardStringConfirm — кнопка подтверждения добавления строки
  - remove-fretboard-string-confirm # elRemoveFretboardStringConfirm — кнопка подтверждения удаления строки

data_select:
  # Атрибут data-select="name" — на <select> внутри template-форм.
  # Выбирается через getter-функции domRefs.ts; id остаётся для <label for>.
  - interval-step-value    # getElIntervalStepSelect — выбор размера интервала (1–12)
  - fretboard-string-note  # getElFretboardStringNoteSelect — выбор ноты открытой струны
  - fretboard-note-octave  # getElFretboardNoteOctaveSelect — выбор октавы ноты

data_container:
  # Только контейнеры, которые запрашиваются в JS (ui.ts / render.ts).
  # На tr-строках таблицы конфигуратора стоят data-container="center|interval|tones|degree" —
  # это навигационные метки для HTML, в JS не используются и здесь не отслеживаются.
  # "interval" на tr — краткое имя строки; "interval-step" на td — ячейки этой строки.
  - tonic           # ← stateScaleBuildParams(.tonic) → elTonicContainer
  - context         # ← stateResolvedScaleParams(.contextTargets) → elContextContainer
  - interval-step   # ← stateScaleBuildParams(.intervalPattern) → elIntervalContainers | var: intervalStep
  - scale-tone      # ← stateUnshiftResolvedScaleParams(.scale) → elScaleToneContainers
  - degree-switch   # → switchDegreeVisibility → stateHiddenDegrees | ← stateHiddenDegrees → elDegreeSwitchContainers
  - resolve-error   # ← stateResolvedScaleParams(.canApplyContext) → elResolveErrorContainer
  - preset-scale-modal # корневой элемент модалки списка пресетов гамм
  - preset-scale-list # mount target списка карточек пресетов гамм внутри modal-body
  - preset-scale-modal-button-label # текст кнопки открытия модалки пресетов гамм; позже может подменяться названием активной гаммы
  - preset-scale-name
  - preset-scale-family-mood
  - preset-scale-type
  - preset-scale-interval-tonic
  - preset-scale-interval-pattern
  - preset-scale-context-offset
  - preset-scale-modal-shift
  - preset-scale-degree-rotation
  - preset-scale-hidden-degrees
  - preset-scale-comment

data_instrument:
  - fretboard              # refs: elFretboard (tbody-контейнер строк)
  - fretboard-string       # refs: elFretboardStrings (per-string tr)
  - fretboard-string-number  # кнопка data-control="remove-fretboard-string"; getElFretboardStringNumberButton; refs нет
  - fretboard-string-note    # TD-ячейка открытой ноты; refs нет; внутри — кнопка data-control="start-note"
  - fretboard-string-fret    # TD-ячейка лада (1–12); refs: elFretboardStringFrets (per-string); getElFretboardStringFrets
  - keyboard               # нет refs
  - keyboard-notes         # tr-контейнер строки нот; нет refs
  - keyboard-note          # refs: elKeyboardNotes (td-ячейки нот)

# Типы из types/index.ts. Источник истины для именования переменных в render.ts и store.ts.
# Если переменная или поле ссылается на концепцию, имя берётся отсюда, а не из позиции в DOM.
key_types:
  - noteName             # поле: scaleBuildParams.tonic, fretboardStartNoteParams.note, fretboardNoteParams.note
  - degree               # поле: noteParams.degree | store: stateHiddenDegrees | action: switchDegreeVisibility
  - intervalPattern      # поле: scaleBuildParams.intervalPattern, resolvedScaleParams.intervalPattern
  - contextOffset        # store: stateContextOffset | action: offsetContext | data-control="context-shift"
  - degreeRotation       # store: stateDegreeRotation | action: offsetDegreeRotation | data-control="degree-rotation"
  - scaleBuildParams     # store: stateScaleBuildParams | поля: tonic, intervalPattern, modalShift
  - resolvedScaleParams  # store: stateResolvedScaleParams, stateUnshiftResolvedScaleParams | var: resolvedScaleParams
  - fretboardStartNoteParams  # store: stateFretboardStartNotes (элемент) | action: setFretboardStartNote | var: startNote, не openNote и не fret0
  - scaleLayouts              # type: scaleLayout[] | store: stateFretboardLayout | результат mapScaleToLayout всех струн
  - fretboardNoteParams       # нота на конкретном ладу | var: noteParams | элемент scaleLayout[fretIndex]
  - scaleLayout          # type: fretboardNoteParams[] | var: layout | результат mapScaleToLayout одной струны
  - locale               # type: 'ru' | 'en' | store: stateLocale | action: switchLocale | data-control="locale-switch"
  - domRefs              # собирается в getDomRefs() в domRefs.ts; тип — единственный источник правды для ref-имён
  - store                # t.store — базовый тип стора (без UI)
  - uiStore              # t.uiStore — тема + toggleTheme
  - uiTheme              # type: 'light' | 'dark' | atom в ui.ts, инициализируется из storageService.selectAll()
  - savedValues          # t.savedValues | StorageService.selectAll() в src/index.ts — единственная точка чтения начального состояния | поля: theme, locale, tonic, intervalPattern, modalShift, contextOffset, degreeRotation, hiddenDegrees, startNotes, activeScalePresetId, activeFretboardPresetId, isEnharmonicSimplify, intervalDisplayMode
  - appStore             # store & uiStore — полный стор приложения
  - intervalDisplayMode  # type: 'digit' | 'letter' | store: stateIntervalDisplayMode
  - setIntervalStep      # action: degree (1-based) + intervalSize → stateScaleBuildParams(.intervalPattern)
  - altReduceMap         # Map<noteName, noteName> — карта замены нот на энгармонические эквиваленты с меньшим числом альтераций | render.ts: buildAltReduceMap, getAltReduceMap, reduceAlt
  - presetScale          # { id, name, scaleType, tonic, intervalPattern, modalShift, contextOffset, degreeRotation, hiddenDegrees, mood, family, comment, isCustomPreset } | хранится в defaults.ts; карточки рендерятся в модалке списка пресетов
  - presetInstrument     # { id, name, tuning, startNotes } | хранится в textPresetsFretboard (i18n, оба локаля)
  - addFretboardString   # action type: () => void | добавляет строку кварту ниже последней, max=MAX_FRETBOARD_STRINGS
  - removeFretboardString # action type: (index: number) => void | удаляет строку по индексу, min=MIN_FRETBOARD_STRINGS

stores:
  - textScaleParams  # type: i18n atom | namespace: scale-params | ключи: offset,center,context,tonal,modal,degrees,hide | → initStaticText
  - textContent      # type: i18n atom | namespace: content | ключи: pageTitle, pageDescription, sections... | → initStaticText
  - textTooltips     # type: i18n atom | ключи: tooltip,hide,tonal,modal,degrees,center,context,fretboard | → initTooltips (Tooltip.setContent)
  - textFretboard    # type: i18n atom | namespace: fretboard | ключи: openNoteLabel, octaveLabel, confirmButton, octaveName0–8, addStringLabel, removeStringLabel, presetName, presetNotes, presetTuning, presetComment | → popover content() в initFretboard
  - textErrors       # type: i18n atom | namespace: errors | ключи: resolveError, openPatternError | → render.ts (сообщение ошибки)
  - textIntervals    # type: i18n atom | namespace: intervals | ключи: halfStep, wholeStep, interval0–12, digitModeLabel | → render.ts, ui.ts (popover)
  - textPresetsScale     # type: i18n atom<presetScale[]> | namespace: presetsScale | 18 пресетов гамм | → будущий UI пресетов
  - textPresetsFretboard # type: i18n atom<presetInstrument[]> | namespace: presetsFretboard | 8 пресетов инструментов | → будущий UI пресетов
  - textPresetScale      # type: i18n atom | namespace: presetScale | label-тексты карточки пресета гаммы
  - stateIntervalDisplayMode  # type: Atom<intervalDisplayMode> | ← interval-display-switch | → elSetIntervalSteps, elIntervalDisplaySwitch
  - stateLocale                     # type: Atom<locale> | atom, инициализируется из storageService.selectAll() | → elLocaleSwitch
  - stateScaleBuildParams           # type: MapStore<scaleBuildParams> | ← tonic-shift, modal-shift | → elTonicContainer, elIntervalContainers
  - stateContextOffset              # type: Atom<contextOffset> | ← context-shift | → (учитывается в stateResolvedScaleParams)
  - stateCurrentNoteChromaticIndex  # computed: stateScaleBuildParams(.tonic) → chromaticIndex (для offsetTonicShift)
  - stateResolvedScaleParams        # computed: resolveScale + applyContextTransform + applyDegreeRotation | → elContextContainer, elKeyboardNotes, renderFretboard
  - stateUnshiftResolvedScaleParams # computed: resolveScale + applyContextTransform (без вращения ступеней) | → elScaleToneContainers
  - stateDegreeRotation             # type: Atom<degreeRotation> | ← degree-rotation | → elScaleToneContainers
  - stateHiddenDegrees              # type: Atom<Set<degree>> | ← degree-switch | → elDegreeSwitchContainers, elKeyboardNotes, renderFretboard
  - stateFretboardStartNotes        # type: Atom<fretboardStartNoteParams[]> | ← start-note | → stateFretboardLayout
  - stateFretboardLayout            # computed: [stateResolvedScaleParams, stateFretboardStartNotes] → scaleLayouts (пустой массив если !canApplyContext) | → renderFretboard
  - stateActiveScalePresetId        # type: Atom<number> | инициализируется из storageService.selectAll() | персистентен через storageService.insert
  - stateActiveFretboardPresetId    # type: Atom<number> | инициализируется из storageService.selectAll() | персистентен через storageService.insert
  - stateIsEnharmonicSimplify         # type: Atom<boolean> | ← enharmonic-simplify (change) | → renderScaleTones, renderKeyboard, renderFretboard | lookup: ENHARMONIC_SIMPLE_NAMES

actions:
  - offsetTonicShift          # ← data-control="tonic-shift" | → stateScaleBuildParams(.tonic)
  - offsetModalShift          # ← data-control="modal-shift" | → stateScaleBuildParams(.modalShift)
  - offsetDegreeRotation      # ← data-control="degree-rotation" | → stateDegreeRotation
  - offsetContext             # ← data-control="context-shift" | → stateContextOffset
  - switchDegreeVisibility    # ← data-container="degree-switch" (click) | → stateHiddenDegrees
  - setFretboardStartNote     # ← data-control="start-note" (popover-форма) | → stateFretboardStartNotes
  - toggleTheme               # ← data-control="theme-switch" | → uiStore.theme
  - switchLocale              # ← data-control="locale-switch" | → stateLocale (atom + storageService.insert)
  - setIntervalStep           # ← data-control="interval-step" (popover select.change) | params: { degree, step } | → stateScaleBuildParams(.intervalPattern)
  - switchIntervalDisplayMode # ← data-control="interval-display-switch" | → stateIntervalDisplayMode
  - switchEnharmonicSimplify  # ← data-control="enharmonic-simplify" (change) | → stateIsEnharmonicSimplify
  - addFretboardString        # ← data-control="add-fretboard-string" (popover) | → stateFretboardStartNotes (append)
  - removeFretboardString     # ← data-control="remove-fretboard-string" (popover) | params: index | → stateFretboardStartNotes (filter)
  - applyScalePreset          # ← data-control="apply-preset-scale" | params: presetScaleId | → stateScaleBuildParams + stateContextOffset + stateDegreeRotation + stateHiddenDegrees + stateActiveScalePresetId
  - offsetScalePreset         # ← data-control="scale-preset-shift" + data-direction | → applyScalePreset(next/prev) | при NO_ACTIVE_PRESET_ID сначала применяет DEFAULT_SCALE_PRESET_ID

render_targets:
  - elBody                    # document.body | ← uiStore.theme → dataset.bsTheme
  - elTooltipTemplate         # data-template="tooltip" | клонируется в initTooltips → кнопка с SVG-иконкой
  - elTooltipPlaceholders     # data-tooltip (все плейсхолдеры) | заменяются клонами elTooltipTemplate в initTooltips
  - elStaticContentElements   # data-static-content (все элементы) | текст устанавливается в initStaticText()
  - elTonicContainer          # data-container="tonic" | ← stateScaleBuildParams(.tonic)
  - elContextContainer        # data-container="context" | ← stateResolvedScaleParams(.contextTargets)
  - elIntervalContainers      # data-container="interval-step" | ← stateScaleBuildParams(.intervalPattern, .modalShift) | ячейка 0 — «0» на td; ячейки 1–7 — кнопки
  - elSetIntervalSteps        # data-control="interval-step" (7 кнопок) | ← intervalPattern, stateIntervalDisplayMode; текст обновляется в renderIntervalContainers
  - elIntervalDisplaySwitch   # data-control="interval-display-switch" | ← stateIntervalDisplayMode, textIntervals; кнопка-переключатель digit/letter
  - elIntervalStepParams      # data-template="interval-step-params" → клонируется в popover content() initIntervalSteps; select заполняется интервалами при каждом открытии
  - elScaleToneContainers     # data-container="scale-tone" | ← stateUnshiftResolvedScaleParams(.scale), stateDegreeRotation
  - elDegreeSwitchContainers  # data-container="degree-switch" | ← stateHiddenDegrees (input-переключатели)
  - elDegreeSwitchLabels      # labels для data-container="degree-switch" | ← stateHiddenDegrees (стилизация label без DOM API в render.ts)
  - elResolveErrorContainer   # data-container="resolve-error" | ← stateResolvedScaleParams(.canApplyContext)
  - elPresetScaleModalButtonLabel # data-container="preset-scale-modal-button-label" | текст кнопки открытия модалки; ← stateActiveScalePresetId/stateLocale
  - elPresetScaleModal        # data-container="preset-scale-modal" | корневой element Bootstrap modal для списка пресетов
  - elPresetScaleList         # data-container="preset-scale-list" | target для replaceChildren списка карточек пресетов
  - elKeyboardNotes           # data-instrument="keyboard-note" (td-ячейки) | ← stateResolvedScaleParams(.scale)
  - elFretboard               # data-instrument="fretboard" (tbody) | target для appendChild в initFretboard
  - elFretboardStrings        # data-instrument="fretboard-string" (per-string tr) | строится в initFretboard из stateFretboardStartNotes
  - elFretboardStartNoteContainers  # data-control="start-note" в data-instrument="fretboard-string-note" | ← stateFretboardLayout
  - elFretboardStringFrets          # td ладов 1–12, per-string | ← stateResolvedScaleParams
  - elFretboardString               # data-template="fretboard-string" → клонируется в initFretboard
  - elPresetScaleCard               # data-template="preset-scale-card" → клонируется в initPresetScaleModal
  - elFretboardNewStringNoteParams  # data-template="fretboard-set-string-params" → клонируется в popover; note select заполняется нотами один раз в getDomRefs
  - elAddFretboardString            # data-control="add-fretboard-string" (кнопка в tfoot) | popover → addFretboardString
  - elAddFretboardStringConfirm     # data-template="add-fretboard-string-confirm" → клонируется в popover content()
  - elRemoveFretboardStringConfirm  # data-template="remove-fretboard-string-confirm" → клонируется в popover content()
  - elDirectionControllers    # data-direction (кнопки up/down) | click → controlToOffset[control](offset) | все четыре контрола (tonic/modal/degree/context) | modal-shift, context-shift и degree-rotation disabled при !canModalShift
  # getter-функции (domRefs.ts) — DOM-запрос внутри per-string элемента
  - getElFretboardStringNumberButton  # → data-control="remove-fretboard-string" внутри tr
  - getElFretboardStartNoteContainer  # → data-control="start-note" внутри tr
  - getElFretboardStringFrets         # → data-instrument="fretboard-string-fret" внутри tr
  - getElPresetScaleCardTextElements   # grouped refs для data-container="preset-scale-*" внутри карточки
  - getElPresetScaleCardLabelElements  # grouped refs для data-static-content="label-preset-scale-*" внутри карточки
  - getElPresetScaleCardActionButtons  # grouped refs для action buttons apply/edit/remove внутри карточки
  - getElIntervalStepSelect           # → data-select="interval-step-value" внутри form
  - getElFretboardStringNoteSelect    # → data-select="fretboard-string-note" внутри form
  - getElFretboardNoteOctaveSelect    # → data-select="fretboard-note-octave" внутри form
  # data-control refs
  - elThemeSwitch             # data-control="theme-switch" | click → toggleTheme → refs.elBody[data-bs-theme]
  - elEnharmonicSimplifySwitch # data-control="enharmonic-simplify" (button) | ← stateIsEnharmonicSimplify (классы btn-secondary/btn-outline-secondary)
  # i18n refs
  - elLocaleSwitch            # data-control="locale-switch" | ← stateLocale (кнопка с текущим не-активным языком)
  # статичные тексты — через initStaticText() по data-static-content, refs не нужны

scale_build_params:
  - tonic          # data-container="tonic" | data-control="tonic-shift" → offsetTonicShift
  - intervalPattern  # data-container="interval-step" | data-control="modal-shift" → offsetModalShift
  - modalShift     # data-control="modal-shift" → offsetModalShift | выделяется в elIntervalContainers[modalShift]

resolved_scale_params:
  - scale          # → elScaleToneContainers, elKeyboardNotes, renderFretboard
  - intervalPattern  # (readonly после resolveScale, не отображается напрямую)
  - canModalShift    # → elDirectionControllers (disabled при false: modal-shift, context-shift, degree-rotation) | → elResolveErrorContainer
  - canApplyContext  # → elResolveErrorContainer (условие отрисовки)
  - contextTargets   # → elContextContainer

key_constants:
  - OCTAVE_SIZE              # 12 — полутонов в октаве (modulo для pitchClass)
  - MAX_PITCH_CLASS_OFFSET   # 6 — максимальное смещение pitchClass при нормализации (квинтовый круг)
  - MIN_FRETBOARD_STRINGS    # 4 — минимальное количество струн фретборда
  - MAX_FRETBOARD_STRINGS    # 12 — максимальное количество струн фретборда
  - FRETBOARD_STRING_INTERVAL # 5 — интервал между струнами по умолчанию (кварта = 5 полутонов)
  - ENHARMONIC_SIMPLE_NAMES  # noteName[12] — канонические имена нот по pitchClass (C C♯ D E♭ … B)
  - DEFAULT_SCALE_PRESET_ID     # 1 — Ионийский лад (C major), дефолтный id при первом запуске
  - DEFAULT_FRETBOARD_PRESET_ID # 6 — Гитара 6 струн стандарт, дефолтный id при первом запуске
